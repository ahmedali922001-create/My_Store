<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<title>الهوديات</title>
<link rel="stylesheet" href="style.css">

</head>

<body>
<header class="top-bar"> <div class="menu">☰</div> <div class="logo"> <img src="images/logo.png.png" alt="Logo"> </div> <div class="cart">🛒</div> </header>
<h1 style="text-align:center;color:white;">الهوديات</h1>

<div class="products-grid" id="products"></div>

<script>

const products = [

{
name:"هودي أسود",
price:25,
image:"images/hoodie1.jpg",
sizes:["S","M","L","XL"],
stock:5
},

{
name:"هودي رمادي",
price:28,
image:"images/hoodie2.jpg",
sizes:["S","M","L","XL"],
stock:3
}

];


const container = document.getElementById("products");

products.forEach((product,index)=>{

container.innerHTML += `

<div class="product">

<img src="${product.image}">

<h3>${product.name}</h3>

<p class="price">$${product.price}</p>

<p id="stock${index}">المخزون: ${product.stock}</p>

<select id="size${index}">

${product.sizes.map(size=>`<option>${size}</option>`).join("")}

</select>

<br><br>

<button onclick="buy(${index})">إضافة للسلة</button>

</div>

`;

});


let cart = 0;

function buy(i){

if(products[i].stock > 0){

products[i].stock--

document.getElementById("stock"+i).innerText =
"المخزون: " + products[i].stock

cart++

document.getElementById("cart-count").innerText = cart

if(products[i].stock == 0){

document.getElementById("stock"+i).innerText =
"نفذ المخزون"

}

}

}

</script>

</body>
</html>
